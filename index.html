<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A股全景 · 行情报表中心</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">A股全景</h1>
      <p class="site-subtitle">每日行情 · 板块分析 · 资金流向 · 个股排行</p>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>欢迎使用 A股全景报表中心</h2>
      <p>自动采集 A 股市场数据，生成可视化 HTML 报表，支持 GitHub Pages 静态部署。</p>
      <a href="reports/index.html" class="btn btn-primary">进入报表列表</a>
    </section>

    <section class="card-grid">
      <a href="reports/index.html#daily" class="card">
        <h3>每日行情</h3>
        <p>大盘指数、涨跌分布、成交量概览</p>
      </a>
      <a href="reports/index.html#industry" class="card">
        <h3>板块行业</h3>
        <p>行业涨跌幅、热点板块追踪</p>
      </a>
      <a href="reports/index.html#fund-flow" class="card">
        <h3>资金流向</h3>
        <p>北向资金、主力资金净流入</p>
      </a>
      <a href="reports/index.html#stock-rank" class="card">
        <h3>个股排行</h3>
        <p>涨幅榜、跌幅榜、成交额榜</p>
      </a>
      <a href="reports/index.html#stock" class="card">
        <h3>个股分析</h3>
        <p>自选股 K 线、均线、区间分析</p>
      </a>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>数据仅供参考，不构成投资建议 · <span id="update-time">--</span></p>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script>
    fetch('assets/data/latest.json')
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('update-time');
        if (el && d.updated_at) el.textContent = '最近更新：' + d.updated_at;
      })
      .catch(() => {});
  </script>
</body>
</html>
